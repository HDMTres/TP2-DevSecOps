name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: ["main", "develop", "feature/**", "test/**"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secrets-scan:
    name: "🔐 Secrets Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  dependency-scan:
    name: "📦 SCA — OWASP Dependency-Check"
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data/
          key: ${{ runner.os }}-dep-check-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-dep-check-

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'TP2-DevSecOps'
          path: '.'
          format: 'HTML,JSON,SARIF'
          out: 'reports'
          args: >-
            --failOnCVSS 7
            --enableRetired

      - name: Upload Dependency-Check reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-reports
          path: reports/
          retention-days: 30

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif

  sast:
    name: "🔍 SAST — Semgrep"
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: TODO Étape 4 — Semgrep
        run: |
          echo "Ajoute ici Semgrep à l'étape 4"
          exit 0

  container-scan:
    name: "🐳 Container Security — Trivy"
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tp2-devsecops:${{ github.sha }} .

      - name: Run Trivy — Table output (logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tp2-devsecops:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: false

      - name: Run Trivy — SARIF output
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: tp2-devsecops:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  security-summary:
    name: "📊 Security Summary"
    runs-on: ubuntu-latest
    needs: [secrets-scan, dependency-scan, sast, container-scan]
    if: ${{ success() }}
    steps:
      - name: Résumé
        run: |
          echo "## 🛡️ Security Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Status | Details |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔐 Secrets | ✅ Passed | Skeleton créé |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📦 SCA | ✅ Passed | Placeholder |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 SAST | ✅ Passed | Placeholder |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🐳 Trivy | ✅ Passed | Placeholder |" >> "$GITHUB_STEP_SUMMARY"
