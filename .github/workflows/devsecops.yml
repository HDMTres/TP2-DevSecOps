name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: ["main", "develop", "feature/**", "test/**"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secrets-scan:
    name: "🔐 Secrets Scan — Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TODO Étape 2 — Gitleaks
        run: |
          echo "Ajoute ici Gitleaks à l'étape 2"
          exit 0

  dependency-scan:
    name: "📦 Dependency Scan — OWASP Dependency-Check"
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: TODO Étape 3 — OWASP Dependency-Check
        run: |
          echo "Ajoute ici OWASP Dependency-Check à l'étape 3"
          exit 0

  sast:
    name: "🔍 SAST — Semgrep"
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: TODO Étape 4 — Semgrep
        run: |
          echo "Ajoute ici Semgrep à l'étape 4"
          exit 0

  container-scan:
    name: "🐳 Container Security — Trivy"
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tp2-devsecops:${{ github.sha }} .

      - name: Run Trivy — Table output (logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tp2-devsecops:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: false

      - name: Run Trivy — SARIF output
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: tp2-devsecops:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  security-summary:
    name: "📊 Security Summary"
    runs-on: ubuntu-latest
    needs: [secrets-scan, dependency-scan, sast, container-scan]
    if: ${{ success() }}
    steps:
      - name: Résumé
        run: |
          echo "## 🛡️ Security Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Status | Details |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔐 Secrets | ✅ Passed | Skeleton créé |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📦 SCA | ✅ Passed | Placeholder |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 SAST | ✅ Passed | Placeholder |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🐳 Trivy | ✅ Passed | Placeholder |" >> "$GITHUB_STEP_SUMMARY"
